services:
  postgres:
    image: postgres:16-alpine
    container_name: parches-postgres
    environment:
      POSTGRES_DB: parches_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: rootpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d parches_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - parches-net

  redis:
    image: redis:7-alpine
    container_name: parches-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - parches-net

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: parches-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"     # AMQP
      - "15672:15672"   # Management UI
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - parches-net

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: parches-app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/parches_db
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: rootpassword
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      JPA_SHOW_SQL: "false"
    ports:
      - "8083:8083"
    networks:
      - parches-net

networks:
  parches-net:
    driver: bridge

volumes:
  postgres_data:
